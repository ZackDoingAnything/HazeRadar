<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesian Kabupaten Map with Cards</title>
    
    <!-- Load Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
        
    <style>
        /* Set full height for map and body */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        
        /* Ensure the map container has height and is relative/absolute correctly */
        #map {
            width: 100%;
            height: 100%;
        }

        /* Ensure Leaflet's popups use the Tailwind font and dark theme */
        .leaflet-popup-content-wrapper, .leaflet-popup-content {
            font-family: 'Inter', sans-serif;
            border-radius: 8px;
            background-color: #1f2937; /* gray-800 */
            color: #d1d5db; /* gray-300 */
        }
        
        .leaflet-popup-tip {
            background-color: #1f2937;
        }
        
        /* Custom popup styling */
        .popup-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f9fafb;
            border-bottom: 1px solid #374151;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        
        .popup-content-table {
            width: 100%;
            margin-top: 8px;
        }
        
        .popup-content-table td {
            padding: 2px 4px;
            font-size: 0.85rem;
        }
        
        .popup-content-table tr td:first-child {
            font-weight: 500;
            color: #9ca3af;
            white-space: nowrap;
            padding-right: 12px;
        }

        /* --- Custom styles for the 5-notch slider --- */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent; /* Hide default track */
            height: 8px; /* Ensure height is set */
        }
        
        .custom-slider::-webkit-slider-runnable-track {
            height: 8px;
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }
        
        .custom-slider::-moz-range-track {
            height: 8px;
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -6px; /* Center thumb vertically */
            width: 20px;
            height: 20px;
            background: #06b6d4; /* cyan-500 */
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #1f2937; /* gray-800 border */
            box-shadow: 0 0 0 2px #06b6d4; /* Extra cyan ring */
            transition: background 0.15s ease-in-out;
        }
        .custom-slider:focus::-webkit-slider-thumb {
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.5); /* Focus ring */
        }

        .custom-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #06b6d4;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #1f2937;
            box-shadow: 0 0 0 2px #06b6d4;
            transition: background 0.15s ease-in-out;
        }
        .custom-slider:focus::-moz-range-thumb {
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.5); /* Focus ring */
        }
    </style>

    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-900 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-gray-800 p-4 z-20 border-b border-gray-700">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-100 text-center">
            Indonesian Kabupaten/Kota GeoJSON Viewer
        </h1>
    </header>

    <!-- Main Content Area: Now controls the vertical stacking of the two main rows -->
    <main class="flex-1 flex justify-center items-start p-2 md:p-4 overflow-y-auto">
        
        <!-- Outer Wrapper: Stacks Row 1 (Map/Cards) and Row 2 (Controls) vertically -->
        <div class="w-full xl:max-w-7xl flex flex-col gap-4">

            <!-- ROW 1 CONTAINER: Map, Mobile Slider, and Square Cards (Side-by-side on desktop) -->
            <!-- We use flex-col here so we can apply 'order' to its direct children (Map, Mobile Slider, Cards) on mobile -->
            <div class="flex flex-col md:flex-row gap-4 flex-shrink-0">

                <!-- 1. Map Container (mobile order-1, desktop order-1) -->
                <div id="map-wrapper" class="w-full relative h-[40vh] md:h-auto md:aspect-video rounded-xl shadow-2xl overflow-hidden bg-gray-800 md:w-3/5 order-1 md:order-1">
                    <!-- Map div -->
                    <div id="map" class="absolute inset-0 z-10"></div>
                    
                    <!-- Loading / Error Overlay -->
                    <div id="message-overlay" class="absolute inset-0 z-20 bg-gray-900 bg-opacity-75 flex items-center justify-center backdrop-blur-sm">
                        <div class="text-center p-6 bg-gray-800 rounded-lg shadow-xl">
                            <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
                            <p id="message-text" class="text-lg font-medium text-gray-200 mt-4">Loading map data...</p>
                        </div>
                    </div>
                </div>
                
                <!-- NEW MOBILE SLIDER PANEL (mobile order-2, hidden on desktop) -->
                <!-- Placed here to be between the Map (order-1) and the Cards (order-3) on mobile -->
                <div id="mobile-slider-panel" class="w-full bg-gray-800 rounded-xl shadow-2xl p-4 flex flex-col flex-shrink-0 order-2 md:hidden">
                    <h3 class="text-lg font-semibold text-cyan-400 mb-2 border-b border-gray-700 pb-1">Filter Level</h3>
                    <div id="slider-region-mobile" class="p-4 bg-gray-700 rounded-lg shadow-inner flex-shrink-0">
                        <label for="notch-slider-mobile" class="block text-sm font-medium text-gray-300 mb-4">Select Data Filter Level (1 to 5)</label>
                        <div class="relative pt-1">
                            <input type="range" min="1" max="5" value="3" step="1" id="notch-slider-mobile" class="w-full custom-slider">
                            <div class="flex justify-between text-xs pt-2 text-gray-400">
                                <span class="w-1/5 text-center -ml-1">1</span>
                                <span class="w-1/5 text-center">2</span>
                                <span class="w-1/5 text-center">3</span>
                                <span class="w-1/5 text-center">4</span>
                                <span class="w-1/5 text-center -mr-1">5</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 2. Square Cards Panel (mobile order-3, desktop order-2) -->
                <div id="square-cards-panel" class="w-full md:w-2/5 bg-gray-800 rounded-xl shadow-2xl p-4 flex-shrink-0 flex flex-col justify-center order-3 md:order-2">
                    <h3 class="text-xl font-semibold text-teal-400 mb-4 border-b border-gray-700 pb-2">Key Metrics</h3>
                    
                    <!-- 4 Square Cards Container -->
                    <div id="square-cards-container" class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                            <p class="text-3xl font-bold text-cyan-400">42</p>
                            <p class="text-sm text-gray-300 text-center mt-1">Total Views</p>
                        </div>
                        <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                            <p class="text-3xl font-bold text-teal-400">5</p>
                            <p class="text-sm text-gray-300 text-center mt-1">Saved Sites</p>
                        </div>
                        <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                            <p class="text-3xl font-bold text-blue-400">92%</p>
                            <p class="text-sm text-gray-300 text-center mt-1">Engagement</p>
                        </div>
                        <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                            <p class="text-3xl font-bold text-purple-400">12</p>
                            <p class="text-sm text-gray-300 text-center mt-1">Shared Maps</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ROW 2: Desktop Slider and Liked Locations (Full Width, below the map/cards) -->
            <div id="controls-panel" class="w-full bg-gray-800 rounded-xl shadow-2xl p-4 flex flex-col flex-shrink-0">
                
                <h2 class="text-xl font-semibold text-cyan-400 mb-4 border-b border-gray-700 pb-2 flex items-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    Filter & Favorites
                </h2>
                
                <!-- 5-Notch Slider Region (DESKTOP ONLY - hidden on mobile) -->
                <div id="slider-region-desktop" class="p-4 bg-gray-700 rounded-lg mb-4 shadow-inner flex-shrink-0 hidden md:block">
                    <label for="notch-slider-desktop" class="block text-sm font-medium text-gray-300 mb-4">Select Data Filter Level (1 to 5)</label>
                    <div class="relative pt-1">
                        <!-- Slider input: min=1, max=5, step=1 for 5 notches -->
                        <input type="range" min="1" max="5" value="3" step="1" id="notch-slider-desktop" class="w-full custom-slider">
                        <!-- Notches/Labels -->
                        <div class="flex justify-between text-xs pt-2 text-gray-400">
                            <span class="w-1/5 text-center -ml-1">1</span>
                            <span class="w-1/5 text-center">2</span>
                            <span class="w-1/5 text-center">3</span>
                            <span class="w-1/5 text-center">4</span>
                            <span class="w-1/5 text-center -mr-1">5</span>
                        </div>
                    </div>
                </div>
                
                <!-- Scrollable List (Now contained with max-height) -->
                <div class="mt-2 flex-shrink-0">
                    <h3 class="text-lg font-semibold text-gray-300 mb-2 border-b border-gray-700 pb-1">Liked Locations (Click to Fly)</h3>
                    <!-- This div manages internal scrolling if the list gets too long -->
                    <div id="liked-locations-list-wrapper" class="max-h-64 overflow-y-auto space-y-3 pb-4">
                        <div id="liked-locations-list" class="space-y-3">
                            <!-- Dynamic cards will be injected here by JavaScript -->
                        </div>
                        <p id="no-cards-message" class="text-gray-400 italic text-center py-8 hidden">
                            No locations have been liked yet.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Define buffered bounds for Indonesia
        const INDONESIA_BOUNDS = [
            [-12, 90], 
            [7, 145]   
        ];
        
        // Mock data assuming you have a list of liked locations with coordinates
        const likedData = [
            { id: 1, name: "Kota Bandung", province: "Jawa Barat", lat: -6.9175, lng: 107.6191 },
            { id: 2, name: "Kota Surabaya", province: "Jawa Timur", lat: -7.2575, lng: 112.7521 },
            { id: 3, name: "Kota Medan", province: "Sumatera Utara", lat: 3.5952, lng: 98.6775 },
            { id: 4, name: "Kota Denpasar", province: "Bali", lat: -8.6705, lng: 115.2127 },
            { id: 5, name: "Kabupaten Raja Ampat", province: "Papua Barat Daya", lat: -0.528, lng: 130.824 },
            { id: 6, name: "Ibu Kota Nusantara", province: "Kalimantan Timur", lat: -0.99, lng: 116.7 },
            { id: 7, name: "Wamena", province: "Papua Pegunungan", lat: -4.10, lng: 138.99 }
        ];

        document.addEventListener('DOMContentLoaded', function () {
            const mapContainer = document.getElementById('map');
            const messageOverlay = document.getElementById('message-overlay');
            const messageText = document.getElementById('message-text');
            const loadingSpinner = document.getElementById('loading-spinner');

            if (!mapContainer) {
                console.error("Map container 'map' not found.");
                messageText.innerText = "Error: Map container not found.";
                loadingSpinner.style.display = 'none';
                return;
            }

            // 1. Initialize the map
            const map = L.map('map').setView([-2.5489, 118.0149], 5);

            // 2. Add a base tile layer (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                maxZoom: 18,
            }).addTo(map);

            // Add a bubble for Bandung (as in original code)
            const bandungCoords = [-6.9175, 107.6191];
            L.circleMarker(bandungCoords, {
                radius: 10,
                color: '#22d3ee',
                fillColor: '#67e8f9',
                fillOpacity: 0.7,
                weight: 2
            })
            .addTo(map)
            .bindPopup("<b>Hello from Bandung!</b><br>This is a custom bubble.");

            // 3. Define styles for the GeoJSON layer
            const defaultStyle = {
                color: "#a5f3fc",       // cyan-200 (border)
                weight: 1,
                opacity: 0.8,
                fillColor: "#14b8a6",   // teal-500 (fill)
                fillOpacity: 0.4
            };

            const highlightStyle = {
                color: "#fde047",       // yellow-300 (border)
                weight: 2,
                opacity: 1,
                fillColor: "#facc15",   // yellow-400 (fill)
                fillOpacity: 0.7
            };
            
            let geoJsonLayer;

            // 4. Function to run for each feature (Popup and Interaction logic)
            function onEachFeature(feature, layer) {
                let popupContent = '';
                const props = feature.properties;
                const name = props.NAMA_KAB || props.NAMA_KOTA || props.NAME || props.nama || props.Name;

                // Build Popup Content
                if (name) { popupContent += `<div class="popup-header">${name}</div>`; } 
                else { popupContent += `<div class="popup-header">GeoJSON Feature</div>`; }
                
                if (props) {
                    popupContent += '<table class="popup-content-table">';
                    for (const key in props) {
                        popupContent += `
                            <tr>
                                <td>${key}</td>
                                <td>${props[key]}</td>
                            </tr>
                        `;
                    }
                    popupContent += '</table>';
                } else {
                    popupContent += '<p>No properties found for this feature.</p>';
                }
                
                layer.bindPopup(popupContent, { maxHeight: 200 });

                // Interaction
                layer.on({
                    mouseover: function (e) {
                        const l = e.target;
                        l.setStyle(highlightStyle);
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            l.bringToFront();
                        }
                    },
                    mouseout: function (e) {
                        if (geoJsonLayer) {
                            geoJsonLayer.resetStyle(e.target);
                        }
                    },
                    click: function (e) {
                        map.fitBounds(e.target.getBounds());
                    }
                });
            }

            // --- Card Rendering Logic ---
            function renderCards(data) {
                const listContainer = document.getElementById('liked-locations-list');
                const noCardsMessage = document.getElementById('no-cards-message');
                listContainer.innerHTML = '';
                
                if (data.length === 0) {
                    noCardsMessage.classList.remove('hidden');
                    return;
                }
                noCardsMessage.classList.add('hidden');
                
                data.forEach(item => {
                    // Note: lat and lng are stored as data attributes for easy access
                    const cardHtml = `
                        <div data-lat="${item.lat}" data-lng="${item.lng}"
                             class="card-item bg-gray-700 hover:bg-gray-600 transition duration-150 p-3 rounded-lg cursor-pointer flex justify-between items-center group shadow-md hover:shadow-lg">
                            <div>
                                <p class="text-gray-50 font-semibold">${item.name}</p>
                                <p class="text-sm text-cyan-300">${item.province}</p>
                            </div>
                            <div class="p-2 bg-gray-600 rounded-full group-hover:bg-cyan-500 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-300 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </div>
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', cardHtml);
                });

                // Add event listeners to the new cards for map interaction
                document.querySelectorAll('.card-item').forEach(card => {
                    card.addEventListener('click', function() {
                        const lat = parseFloat(this.getAttribute('data-lat'));
                        const lng = parseFloat(this.getAttribute('data-lng'));
                        
                        // Fly to the location on the map with a smooth animation
                        map.flyTo([lat, lng], 10, {
                            duration: 1.5
                        });
                        
                        // Simple visual feedback on click
                        this.classList.add('ring-4', 'ring-cyan-500', 'ring-opacity-50');
                        setTimeout(() => {
                            this.classList.remove('ring-4', 'ring-cyan-500', 'ring-opacity-50');
                        }, 1000);
                    });
                });
            }
            // --- End Card Rendering Logic ---

            // 5. Load the GeoJSON file
            async function loadGeoJson() {
                try {
                    const response = await fetch('kabupaten.JSON');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    // Create the GeoJSON layer
                    geoJsonLayer = L.geoJSON(data, {
                        style: defaultStyle,
                        onEachFeature: onEachFeature
                    }).addTo(map);
                    
                    // Zoom the map to fit the loaded data
                    map.fitBounds(geoJsonLayer.getBounds());
                    
                    // 1. Set the fixed, buffered bounds
                    map.setMaxBounds(INDONESIA_BOUNDS);
                    
                    // 2. Set the current zoom level after fitting as the minimum zoom level.
                    const minZoomLevel = map.getZoom();
                    map.setMinZoom(minZoomLevel);
                    
                    // Hide loading overlay first, so the map container settles to its final size
                    messageOverlay.style.display = 'none';

                    // *** CRITICAL FIX: Invalidate size after layout settles ***
                    // This ensures Leaflet correctly calculates its center and tile positions
                    map.invalidateSize(); 

                } catch (error) {
                    console.error('Error loading or parsing GeoJSON:', error);
                    messageText.innerText = `Error loading map data: ${error.message}. Please check the file 'kabupaten.JSON' and browser console.`;
                    loadingSpinner.style.display = 'none';
                    messageOverlay.style.backgroundColor = 'rgba(127, 29, 29, 0.85)';
                    messageText.style.color = '#fca5a5';
                }
            }

            // Start loading the data and rendering cards
            loadGeoJson();
            renderCards(likedData);
        });
    </script>

</body>
</html>
