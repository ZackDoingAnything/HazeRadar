<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title updated from 7-Day to 3-Day -->
    <title>HazeRadar: 3-Day Smoke Prediction</title>
    
    <!-- Load Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
        
    <style>
        /* Set full height for map and body */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        
        /* Ensure the map container has height and is relative/absolute correctly */
        #map {
            width: 100%;
            height: 100%;
        }

        /* --- CUSTOM MINIMALIST SCROLLBAR STYLES (SIMPLIFIED) --- */
        
        /* For Chrome, Edge, Safari: Minimal dimensions, focused on color */
        body::-webkit-scrollbar,
        #affected-areas-list-wrapper::-webkit-scrollbar,
        #controls-panel-wrapper::-webkit-scrollbar {
            width: 8px; /* Required for WebKit browsers to show the scrollbar */
        }

        body::-webkit-scrollbar-track,
        #affected-areas-list-wrapper::-webkit-scrollbar-track,
        #controls-panel-wrapper::-webkit-scrollbar-track {
            background: #1f2937; /* gray-800 */
            border-radius: 4px; 
        }

        body::-webkit-scrollbar-thumb,
        #affected-areas-list-wrapper::-webkit-scrollbar-thumb,
        #controls-panel-wrapper::-webkit-scrollbar-thumb {
            background-color: #4b5563; /* gray-600 */
            border-radius: 4px; 
            /* Simple border to match the background/track color */
            border: 2px solid #1f2937; 
        }

        body::-webkit-scrollbar-thumb:hover,
        #affected-areas-list-wrapper::-webkit-scrollbar-thumb:hover,
        #controls-panel-wrapper::-webkit-scrollbar-thumb:hover {
            background-color: #6b7280; /* gray-500 on hover */
        }
        
        /* For Firefox: Uses implicit dimensions */
        * {
            /* Sets thumb color (#4b5563) and track color (#1f2937) */
            scrollbar-color: #4b5563 #1f2937; 
            scrollbar-width: thin;
        }

        /* --- END SCROLLBAR STYLES --- */

        /* Ensure Leaflet's popups use the Tailwind font and dark theme */
        .leaflet-popup-content-wrapper, .leaflet-popup-content {
            font-family: 'Inter', sans-serif;
            border-radius: 8px;
            background-color: #1f2937; /* gray-800 */
            color: #d1d5db; /* gray-300 */
        }
        
        .leaflet-popup-tip {
            background-color: #1f2937;
        }
        
        /* Custom popup styling */
        .popup-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f9fafb;
            border-bottom: 1px solid #374151;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        
        .popup-content-table {
            width: 100%;
            margin-top: 8px;
        }
        
        .popup-content-table td {
            padding: 2px 4px;
            font-size: 0.85rem;
        }
        
        .popup-content-table tr td:first-child {
            font-weight: 500;
            color: #9ca3af;
            white-space: nowrap;
            padding-right: 12px;
        }

        /* --- Custom styles for the 7-notch slider --- */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent; /* Hide default track */
            height: 8px; /* Ensure height is set */
        }
        
        .custom-slider::-webkit-slider-runnable-track {
            height: 8px;
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }
        
        .custom-slider::-moz-range-track {
            height: 8px;
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -6px; /* Center thumb vertically */
            width: 20px;
            height: 20px;
            background: #06b6d4; /* cyan-500 */
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #1f2937; /* gray-800 border */
            box-shadow: 0 0 0 2px #06b6d4; /* Extra cyan ring */
            transition: background 0.15s ease-in-out;
        }
        .custom-slider:focus::-webkit-slider-thumb {
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.5); /* Focus ring */
        }

        .custom-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #06b6d4;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #1f2937;
            box-shadow: 0 0 0 2px #06b6d4;
            transition: background 0.15s ease-in-out;
        }
        .custom-slider:focus::-moz-range-thumb {
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.5); /* Focus ring */
        }
    </style>

    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-900 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-gray-800 p-4 z-20 border-b border-gray-700">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-100 text-center">
            HazeRadar: 3-Day Forecast
        </h1>
    </header>

    <!-- Main Content Area: Now controls the vertical stacking of the two main rows -->
    <main class="flex-1 flex justify-center items-start p-2 md:p-4 overflow-y-auto">
        
        <!-- Outer Wrapper: Stacks Row 1 (Map/Controls) and Row 2 (Cards) vertically -->
        <div class="w-full xl:max-w-7xl flex flex-col gap-4">

            <!-- ROW 1 CONTAINER: Map (L) and Controls Panel (R) - Side-by-side on desktop -->
            <div class="flex flex-col md:flex-row gap-4 flex-shrink-0">

                <!-- 1. Map Container (md:w-3/5, order-1) -->
                <div id="map-wrapper" class="w-full relative h-[60vh] md:h-auto md:aspect-video rounded-xl shadow-2xl overflow-hidden bg-gray-800 md:w-3/5 order-1">
                    <!-- Map div -->
                    <div id="map" class="absolute inset-0 z-10"></div>
                    
                    <!-- Loading / Error Overlay -->
                    <div id="message-overlay" class="absolute inset-0 z-20 bg-gray-900 bg-opacity-75 flex items-center justify-center backdrop-blur-sm">
                        <div class="text-center p-6 bg-gray-800 rounded-lg shadow-xl">
                            <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500 mx-auto"></div>
                            <p id="message-text" class="text-lg font-medium text-gray-200 mt-4">Loading map data...</p>
                        </div>
                    </div>
                </div>
                
                <!-- 2. Unified Controls Panel (md:w-2/5, order-2) -->
                <div id="controls-panel-wrapper" class="w-full md:w-2/5 bg-gray-800 rounded-xl shadow-2xl p-4 flex flex-col flex-shrink-0 order-2 md:overflow-y-auto">
                    
                    <!-- Prediction Timeline Header -->
                    <h2 class="text-xl font-semibold text-cyan-400 mb-4 border-b border-gray-700 pb-2 flex items-center flex-shrink-0">
                        <!-- Clock Icon for Timeline -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Prediction Timeline
                    </h2>
                    
                    <!-- Slider Region (Appears on BOTH mobile and desktop now) -->
                    <div id="slider-region" class="p-4 bg-gray-700 rounded-lg mb-4 shadow-inner flex-shrink-0">
                        <label for="notch-slider" class="block text-sm font-medium text-gray-300 mb-4">Current Time Selection: <span id="time-label" class="font-bold text-teal-300">12hr</span></label>
                        <div class="relative pt-1">
                            <!-- Single Slider input, used for both mobile/desktop -->
                            <input type="range" min="1" max="7" value="4" step="1" id="notch-slider" class="w-full custom-slider">
                            
                            <!-- 7 Labels for 7 nodes - Added px-2 and pb-2 for padding -->
                            <div class="flex justify-between text-xs pt-2 pb-2 px-2 text-gray-400">
                                <span class="text-center">Now</span>
                                <span class="text-center">3hr</span>
                                <span class="text-center">6hr</span>
                                <span class="text-center">12hr</span>
                                <span class="text-center">1d</span>
                                <span class="text-center">2d</span>
                                <span class="text-center">3d</span>
                            </div>
                        </div>
                    </div>

                    <!-- Affected Areas List -->
                    <div class="mt-2 flex-shrink-0">
                        <h3 class="text-lg font-semibold text-gray-300 mb-2 border-b border-gray-700 pb-1">Affected Areas (Click to View)</h3>
                        <!-- This div manages internal scrolling if the list gets too long -->
                        <div id="affected-areas-list-wrapper" class="max-h-64 overflow-y-auto space-y-3 pb-4">
                            <div id="affected-areas-list" class="space-y-3">
                                <!-- Dynamic cards will be injected here by JavaScript -->
                            </div>
                            <p id="no-cards-message" class="text-gray-400 italic text-center py-8 hidden">
                                No locations have been liked yet.
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ROW 2 CONTAINER: Haze Metrics Cards (Full Width, below map/controls) -->
            <div id="haze-metrics-panel" class="w-full bg-gray-800 rounded-xl shadow-2xl p-4 flex-shrink-0">
                <h3 class="text-xl font-semibold text-teal-400 mb-4 border-b border-gray-700 pb-2">Haze Metrics</h3>
                
                <!-- 4 Square Cards Container -->
                <div id="square-cards-container" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                        <p id="metric-current-haze" class="text-3xl font-bold text-cyan-400">Moderate</p>
                        <p class="text-sm text-gray-300 text-center mt-1">Current Status</p>
                    </div>
                    <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                        <p id="metric-predicted-aqi" class="text-3xl font-bold text-teal-400">155</p>
                        <p class="text-sm text-gray-300 text-center mt-1">Predicted AQI</p>
                    </div>
                    <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                        <p id="metric-wind-speed" class="text-3xl font-bold text-blue-400">12 km/h</p>
                        <p class="text-sm text-gray-300 text-center mt-1">Wind Speed</p>
                    </div>
                    <div class="bg-gray-700 p-3 rounded-xl aspect-square flex flex-col justify-center items-center shadow-md hover:bg-gray-600 transition cursor-default">
                        <p id="metric-visibility" class="text-3xl font-bold text-purple-400">8.5 km</p>
                        <p class="text-sm text-gray-300 text-center mt-1">Visibility</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Define buffered bounds for Indonesia
        const INDONESIA_BOUNDS = [
            [-12, 90], 
            [7, 145]   
        ];
        
        // Define the 7 time periods (mapping slider value 1-7 to a label)
        const TIME_PERIODS = {
            1: "Now",
            2: "3hr",
            3: "6hr",
            4: "12hr",
            5: "1d",
            6: "2d",
            7: "3d"
        };

        // Mock data assuming you have a list of affected locations
        const affectedAreasData = [
            { id: 1, name: "Kota Bandung", province: "Jawa Barat", lat: -6.9175, lng: 107.6191, aqi: 102, status: 'Moderate' },
            { id: 2, name: "Kota Surabaya", province: "Jawa Timur", lat: -7.2575, lng: 112.7521, aqi: 78, status: 'Good' },
            { id: 3, name: "Kota Medan", province: "Sumatera Utara", lat: 3.5952, lng: 98.6775, aqi: 155, status: 'Unhealthy' },
            { id: 4, name: "Kota Denpasar", province: "Bali", lat: -8.6705, lng: 115.2127, aqi: 45, status: 'Good' },
            { id: 5, name: "Kabupaten Raja Ampat", province: "Papua Barat Daya", lat: -0.528, lng: 130.824, aqi: 22, status: 'Good' },
        ];

        document.addEventListener('DOMContentLoaded', function () {
            const mapContainer = document.getElementById('map');
            const messageOverlay = document.getElementById('message-overlay');
            const messageText = document.getElementById('message-text');
            const loadingSpinner = document.getElementById('loading-spinner');
            // Single slider element
            const slider = document.getElementById('notch-slider');
            // Single time label element
            const timeLabel = document.getElementById('time-label');

            if (!mapContainer) {
                console.error("Map container 'map' not found.");
                messageText.innerText = "Error: Map container not found.";
                loadingSpinner.style.display = 'none';
                return;
            }

            // 1. Initialize the map
            const map = L.map('map').setView([-2.5489, 118.0149], 5);

            // 2. Add a base tile layer (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                maxZoom: 18,
            }).addTo(map);


            // --- SLIDER & UI UPDATE LOGIC ---
            function updatePredictionUI(timePeriod) {
                // 1. Update the display label
                timeLabel.textContent = timePeriod;

                // 2. Mock: Update the metric cards based on the selected time
                const sliderValue = parseInt(slider.value);
                // Example shift: +20 AQI per step past 12hr
                const currentAQI = 100 + (sliderValue - 4) * 20 + Math.floor(Math.random() * 10); 
                document.getElementById('metric-predicted-aqi').textContent = currentAQI;
                
                let status = 'Moderate';
                let statusColor = 'text-yellow-400'; // Default for Moderate
                
                if (currentAQI > 200) { status = 'Hazardous'; statusColor = 'text-purple-400'; }
                else if (currentAQI > 150) { status = 'Unhealthy'; statusColor = 'text-red-400'; }
                else if (currentAQI > 100) { status = 'Moderate'; statusColor = 'text-yellow-400'; }
                else { status = 'Good'; statusColor = 'text-teal-400'; }

                const statusEl = document.getElementById('metric-current-haze');
                statusEl.textContent = status;
                // Ensures color palette consistency for status text
                statusEl.className = `text-3xl font-bold ${statusColor}`; 

                // 3. Update map layer visualization (Placeholder - actual implementation needed)
                console.log(`Map visualization needs update for time: ${timePeriod}`);
            }

            // Function to handle slider change
            function handleSliderChange(event) {
                const sliderValue = event.target.value;
                const timePeriod = TIME_PERIODS[sliderValue];
                updatePredictionUI(timePeriod);
            }

            // Attach event listener to the single slider
            slider.addEventListener('input', handleSliderChange);
            
            // Initialize UI with default value
            updatePredictionUI(TIME_PERIODS[slider.value]);


            // --- MAP & GEOJSON LOGIC ---

            // Add a bubble for Bandung 
            const bandungCoords = [-6.9175, 107.6191];
            L.circleMarker(bandungCoords, {
                radius: 10,
                color: '#22d3ee',
                fillColor: '#67e8f9',
                fillOpacity: 0.7,
                weight: 2
            })
            .addTo(map)
            .bindPopup("<div class='popup-header'>Bandung (Jawa Barat)</div><p>Mock AQI: 102 (Moderate)</p>");

            // 3. Define styles for the GeoJSON layer
            const defaultStyle = {
                color: "#a5f3fc",       // cyan-200 (border)
                weight: 1,
                opacity: 0.8,
                fillColor: "#14b8a6",   // teal-500 (fill)
                fillOpacity: 0.4
            };

            const highlightStyle = {
                color: "#fde047",       // yellow-300 (border)
                weight: 2,
                opacity: 1,
                fillColor: "#facc15",   // yellow-400 (fill)
                fillOpacity: 0.7
            };
            
            let geoJsonLayer;

            // 4. Function to run for each feature (Popup and Interaction logic)
            function onEachFeature(feature, layer) {
                let popupContent = '';
                const props = feature.properties;
                const name = props.NAMA_KAB || props.NAMA_KOTA || props.NAME || props.nama || props.Name;

                // Build Popup Content - REVERTED to show detailed properties table
                if (name) { popupContent += `<div class="popup-header">${name}</div>`; } 
                else { popupContent += `<div class="popup-header">GeoJSON Feature</div>`; }
                
                if (props) {
                    popupContent += '<table class="popup-content-table">';
                    for (const key in props) {
                        // Skip system/internal properties often found in GeoJSON files
                        if (key.startsWith('_') || key === 'id' || key === 'bbox') continue;

                        popupContent += `
                            <tr>
                                <td>${key}</td>
                                <td>${props[key]}</td>
                            </tr>
                        `;
                    }
                    popupContent += '</table>';
                } else {
                    popupContent += '<p>No properties found for this feature.</p>';
                }
                
                layer.bindPopup(popupContent, { maxHeight: 200 });

                // Interaction
                layer.on({
                    mouseover: function (e) {
                        const l = e.target;
                        l.setStyle(highlightStyle);
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            l.bringToFront();
                        }
                    },
                    mouseout: function (e) {
                        if (geoJsonLayer) {
                            geoJsonLayer.resetStyle(e.target);
                        }
                    },
                    click: function (e) {
                        map.fitBounds(e.target.getBounds());
                    }
                });
            }

            // --- Card Rendering Logic ---
            function renderAffectedAreas(data) {
                const listContainer = document.getElementById('affected-areas-list');
                const noCardsMessage = document.getElementById('no-cards-message');
                listContainer.innerHTML = '';
                
                if (data.length === 0) {
                    noCardsMessage.classList.remove('hidden');
                    return;
                }
                noCardsMessage.classList.add('hidden');
                
                data.forEach(item => {
                    const statusClass = item.status === 'Unhealthy' ? 'text-red-400' : 
                                        item.status === 'Moderate' ? 'text-yellow-400' : 'text-teal-400';
                                        
                    const cardHtml = `
                        <div data-lat="${item.lat}" data-lng="${item.lng}"
                             class="card-item bg-gray-700 hover:bg-gray-600 transition duration-150 p-3 rounded-lg cursor-pointer flex justify-between items-center group shadow-md hover:shadow-lg">
                            <div>
                                <p class="text-gray-50 font-semibold">${item.name}</p>
                                <p class="text-sm text-gray-300">${item.province}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold ${statusClass}">${item.status}</p>
                                <p class="text-xs text-gray-400">AQI: ${item.aqi}</p>
                            </div>
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', cardHtml);
                });

                // Add event listeners to the new cards for map interaction
                document.querySelectorAll('.card-item').forEach(card => {
                    card.addEventListener('click', function() {
                        const lat = parseFloat(this.getAttribute('data-lat'));
                        const lng = parseFloat(this.getAttribute('data-lng'));
                        
                        // Fly to the location on the map with a smooth animation
                        map.flyTo([lat, lng], 10, {
                            duration: 1.5
                        });
                        
                        // Simple visual feedback on click
                        this.classList.add('ring-4', 'ring-cyan-500', 'ring-opacity-50');
                        setTimeout(() => {
                            this.classList.remove('ring-4', 'ring-cyan-500', 'ring-opacity-50');
                        }, 1000);
                    });
                });
            }
            // --- End Card Rendering Logic ---

            // 5. Load the GeoJSON file
            async function loadGeoJson() {
                try {
                    // NOTE: This relies on the 'kabupaten.JSON' file being available in the environment.
                    const response = await fetch('kabupaten.JSON');
                    
                    if (!response.ok) {
                        // Throw a specific error if the GeoJSON file is not found or inaccessible
                        throw new Error(`HTTP error! status: ${response.status}. The GeoJSON file 'kabupaten.JSON' could not be loaded.`);
                    }
                    
                    const data = await response.json();
                    
                    // Create the GeoJSON layer
                    geoJsonLayer = L.geoJSON(data, {
                        style: defaultStyle,
                        onEachFeature: onEachFeature
                    }).addTo(map);
                    
                    // Zoom the map to fit the loaded data
                    map.fitBounds(geoJsonLayer.getBounds());
                    
                    // 1. Set the fixed, buffered bounds
                    map.setMaxBounds(INDONESIA_BOUNDS);
                    
                    // 2. Set the current zoom level after fitting as the minimum zoom level.
                    const minZoomLevel = map.getZoom();
                    map.setMinZoom(minZoomLevel);
                    
                    // Hide loading overlay first, so the map container settles to its final size
                    messageOverlay.style.display = 'none';

                    // *** CRITICAL FIX: Invalidate size after layout settles ***
                    map.invalidateSize(); 

                } catch (error) {
                    console.error('Error loading or parsing GeoJSON:', error);
                    messageText.innerText = `Error loading map data: ${error.message}. Please ensure 'kabupaten.JSON' is available.`;
                    loadingSpinner.style.display = 'none';
                    messageOverlay.style.backgroundColor = 'rgba(127, 29, 29, 0.85)';
                    messageText.style.color = '#fca5a5';
                }
            }

            // Start loading the data and rendering affected areas
            loadGeoJson();
            renderAffectedAreas(affectedAreasData);
        });
    </script>

</body>
</html>
